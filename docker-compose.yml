services:
  caddy:
    image: caddy:2-alpine
    container_name: babyphone-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - caddy-data:/data
      - caddy-config:/config
    command: caddy reverse-proxy --from ${DOMAIN:?Set DOMAIN in .env} --to babyphone:3000
    depends_on:
      - babyphone

  babyphone:
    build: .
    container_name: babyphone
    restart: unless-stopped
    expose:
      - "3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - CONTACT_EMAIL=${CONTACT_EMAIL:-admin@example.com}
    volumes:
      - vapid-keys:/app/server

  coturn:
    image: coturn/coturn:latest
    container_name: babyphone-coturn
    restart: unless-stopped
    network_mode: host
    command:
      - --listening-port=3478
      - --tls-listening-port=5349
      - --realm=${DOMAIN:?Set DOMAIN in .env}
      - --server-name=${DOMAIN:?Set DOMAIN in .env}
      - --use-auth-secret
      - --static-auth-secret=${TURN_SECRET:?Set TURN_SECRET in .env}
      - --min-port=49152
      - --max-port=65535
      - --fingerprint
      - --no-multicast-peers
      - --no-cli
      - --log-file=stdout
      - --verbose

volumes:
  vapid-keys:
  caddy-data:
  caddy-config:
